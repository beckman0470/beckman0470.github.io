          <span class="card-journal">${journal.label}</span>
          <span class="card-date">${item.date}</span>
        </div>
        <h3>${item.title}</h3>
        <p class="card-excerpt">${item.excerpt}</p>
        <div class="card-tags">${(item.tags || []).map(tag => `<span>${tag}</span>`).join('')}</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
