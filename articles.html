    const aliases = { memory: 'family', clinic: 'health', photo: 'light' };
    const rawJournal = params.get('journal');
    const normalizedJournal = aliases[rawJournal] || rawJournal;
    const key = journals[normalizedJournal] ? normalizedJournal : 'family';
    const journal = journals[key];

    document.body.dataset.journal = key;
    document.title = `雞爸爸生活研究室｜${journal.label}`;
    document.getElementById('journal-title').textContent = journal.label;
    document.getElementById('journal-subtitle').textContent = journal.subtitle;
    document.getElementById('about-title').textContent = journal.aboutTitle;
    document.getElementById('about-text').textContent = journal.aboutText;
    const thumb = document.getElementById('about-thumb');
    thumb.src = journal.room;
    thumb.alt = `${journal.label} 房間場景插畫`;
    document.getElementById('journal-more').textContent = `瀏覽更多${journal.label}文章 →`;
    document.getElementById('room-bg').style.backgroundImage = `url('${journal.room}')`;

    document.querySelectorAll('.main-nav a').forEach(link => {
      const active = link.dataset.nav === key;
      link.classList.toggle('active', active);
      if (active) link.setAttribute('aria-current', 'page');
      else link.removeAttribute('aria-current');
    });

    const pills = document.getElementById('journal-pills');
    journal.pills.forEach(p => {
      const span = document.createElement('span');
      span.className = 'pill';
      span.textContent = p;
      pills.appendChild(span);
    });


    function autoCover(item) {
      const text = `${item.title} ${(item.tags || []).join(' ')} ${item.excerpt || ''}`;
      if (/YouTube|短影音|影片|動畫/.test(text)) return 'https://img.youtube.com/vi/Rfg6SpruQKo/hqdefault.jpg';
      if (/AI|製圖|網站|迷因|共創|Gemini|ChatGPT/.test(text)) return 'images/cover-ai.svg';
      if (/味全龍|棒球|徐若熙|陳子豪|TTO|盜壘|龍魂/.test(text)) return 'images/cover-baseball.svg';
      if (/龍弟弟|父子|阿格|肚肚/.test(text)) return 'images/cover-dragon-brother.svg';
      if (/鼠姊姊|女孩|畢業|游泳|夏天|工作坊|勇氣/.test(text)) return 'images/cover-dodo.svg';
      if (/氣喘|肌酸|皮膚|HSP|能量|健康|壓力|照護|保健|睡眠|數據雜訊/.test(text)) return 'images/cover-health.svg';
      if (/鏢人|金庸|令狐沖|閱讀|小說|漫畫|筆記|大漠|諦聽/.test(text)) return 'images/hero-journal.svg';
      if (item.journal === 'family') return 'images/cover-family.svg';
      if (item.journal === 'health') return 'images/cover-health.svg';
      if (item.journal === 'library') return 'images/hero-journal.svg';
      if (item.journal === 'style') return 'images/cover-baseball.svg';
      if (item.journal === 'light') return 'images/cover-ai.svg';
      return 'assets/story-covers/default.svg';
    }

    const grid = document.getElementById('cards-grid');
    const filtered = stories.filter(item => item.journal === key);
    filtered.forEach(item => {
      const a = document.createElement('a');
      a.className = 'story-card';
      a.href = item.href || '#';
      const cardImage = autoCover(item);
      const cardPosition = autoCoverPosition(item).replace(/"/g, '&quot;');
      const cardAlt = (item.coverAlt || `${item.title} 封面`).replace(/"/g, '&quot;');
      a.innerHTML = `
        <div class="card-media">
          <img src="${cardImage}" alt="${cardAlt}" loading="lazy" style="object-position:${cardPosition};" onerror="this.onerror=null;this.src='assets/story-covers/default.svg';">
        </div>
        <div class="card-head">
          <span class="card-journal">${journal.label}</span>
          <span class="card-date">${item.date}</span>
        </div>
        <h3>${item.title}</h3>
        <p class="card-excerpt">${item.excerpt}</p>
        <div class="card-tags">${(item.tags || []).map(tag => `<span>${tag}</span>`).join('')}</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
