  <style>
    :root {
      --bg:#f6f0e6;
      --card:#fffaf3;
      --line:#eadbc8;
      --text:#5b3d27;
      --muted:#7a6857;
      --accent:#c68433;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    a { color:inherit; text-decoration:none; }
    .site-header {
      background:rgba(255,250,243,.92);
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(8px);
    }
    .wrap {
      width:min(1280px, calc(100% - 48px));
      margin:0 auto;
    }
    .header-inner {
      min-height:86px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:24px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:14px;
    }
    .brand-avatar {
      width:54px;
      height:54px;
      border-radius:999px;
      object-fit:cover;
      box-shadow:0 6px 16px rgba(73,48,24,.12);
    }
    .brand-text strong {
      display:block;
      font-size:18px;
      font-weight:900;
      letter-spacing:.02em;
    }
    .brand-text span {
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }
    .main-nav {
      justify-self:center;
      display:flex;
      align-items:center;
      gap:28px;
      flex-wrap:wrap;
    }
    .main-nav a {
      font-weight:900;
      padding:8px 0;
      border-bottom:3px solid transparent;
    }
    .main-nav a.active {
      color:var(--accent);
      border-bottom-color:var(--accent);
    }
    .search-link {
      justify-self:end;
      font-size:28px;
      color:#704d2e;
      line-height:1;
      padding:6px 10px;
    }
    main {
      padding:22px 0 42px;
    }
    .scene-wrap {
      width:min(1480px, calc(100% - 48px));
      margin:0 auto;
    }
    .prototype-scene {
      position:relative;
      width:100%;
      border-radius:26px;
      overflow:hidden;
      box-shadow:0 16px 42px rgba(86,60,32,.12);
      background:#efe4d1;
    }
    .prototype-scene img {
      width:100%;
      display:block;
      height:auto;
    }
    .hotspot {
      position:absolute;
      display:block;
      border-radius:22px;
      outline:0;
      transition: box-shadow .18s ease, background .18s ease;
    }
    .hotspot:hover, .hotspot:focus-visible {
      box-shadow:0 0 0 3px rgba(198,132,51,.62) inset, 0 0 0 4px rgba(255,255,255,.66);
      background:rgba(255,255,255,.08);
    }
    .scene-summary {
      margin:18px auto 0;
      max-width:1200px;
    }
    details.fallback {
      background:rgba(255,251,245,.9);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 18px;
      box-shadow:0 8px 24px rgba(86,60,32,.05);
    }
    details.fallback summary {
      cursor:pointer;
      font-weight:900;
      color:var(--text);
    }
    .fallback-links {
      margin-top:10px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px 18px;
    }
    .fallback-links a {
      padding:10px 12px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      color:#6f5844;
      font-weight:700;
    }
    @media (max-width: 960px) {
      .wrap, .scene-wrap { width:min(100% - 24px, 1280px); }
      .header-inner { grid-template-columns:1fr; gap:10px; padding:14px 0; }
      .brand, .main-nav, .search-link { justify-self:center; }
      .main-nav { gap:18px; justify-content:center; }
      .fallback-links { grid-template-columns:1fr; }
    }
  </style>
</head>

  <script>
    (function() {
      const stories = JSON.parse(document.getElementById('story-data').textContent);
      const scenes = JSON.parse(document.getElementById('scene-data').textContent);
      const params = new URLSearchParams(location.search);
      const journal = params.get('journal') || 'family';
      const key = scenes[journal] ? journal : 'family';
      const scene = scenes[key];
      document.querySelectorAll('.main-nav a').forEach(a => {
        a.classList.toggle('active', a.dataset.nav === key);
        if (a.dataset.nav === key) a.setAttribute('aria-current', 'page');
      });
      const img = document.getElementById('scene-image');
      img.src = scene.image + '?v=57';
      img.alt = scene.label + ' Prototype 內容頁';
      const hotspotBox = document.getElementById('scene-hotspots');
      const fallback = document.getElementById('fallback-links');
      const pool = stories.filter(s => s.journal === key);
      const cards = pool.slice(0, scene.hotspots.length);

      scene.hotspots.forEach((box, idx) => {
        const item = cards[idx];
        if (!item) return;
        const a = document.createElement('a');
        a.className = 'hotspot';
        a.href = item.href;
        a.setAttribute('aria-label', item.title);
        a.title = item.title;
        a.style.left = box.left + '%';
        a.style.top = box.top + '%';
        a.style.width = box.width + '%';
        a.style.height = box.height + '%';
        hotspotBox.appendChild(a);
      });

      if (scene.cta) {
        const more = document.createElement('a');
        more.className = 'hotspot';
        more.href = '#fallback-links';
        more.setAttribute('aria-label', '查看更多 ' + scene.label + ' 文章');
        more.style.left = scene.cta.left + '%';
        more.style.top = scene.cta.top + '%';
        more.style.width = scene.cta.width + '%';
        more.style.height = scene.cta.height + '%';
        hotspotBox.appendChild(more);
      }

      pool.forEach(item => {
        const a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.title;
        a.title = item.date ? (item.date + '｜' + item.title) : item.title;
        fallback.appendChild(a);
      });
    })();
  </script>
