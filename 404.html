<!DOCTYPE html>

<head>

<title>找不到頁面｜雞爸爸生活研究室</title>

<style>
:root{--paper:#F8F6F1;--surface:#FFFDF8;--ink:#263328;--muted:#687463;--brown:#A67C52;--line:#E6DED1;--shadow:0 24px 60px rgba(70,55,35,.12);--serif:Georgia,"Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.75}.container{width:min(760px,calc(100% - 40px));margin:auto}a{text-decoration:none;color:inherit}.wrap{min-height:100vh;display:flex;align-items:center;padding:60px 0}.card{background:var(--surface);border:1px solid var(--line);border-radius:34px;padding:44px;box-shadow:var(--shadow)}.kicker{font-size:13px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--brown)}h1{font-family:var(--serif);font-size:clamp(44px,7vw,78px);line-height:1.05;margin:14px 0}.muted{color:var(--muted);font-size:20px}.btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;padding:13px 22px;border-radius:999px;background:var(--ink);color:white;font-weight:950}.btn.secondary{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
</style>
</head>
<body>
<main class="wrap">
  <div class="container">
    <div class="card">
      <div class="kicker">404</div>
      <h1>這個故事暫時找不到。</h1>

      <div class="btns">
        <a class="btn" href="./index.html">回首頁</a>
        <a class="btn secondary" href="./articles.html">看故事典藏</a>
      </div>
    </div>
  </div>
</main>
</body>
</html>
